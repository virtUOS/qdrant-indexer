name: Auto Update Image

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 6am UTC
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Normalize image name
        id: meta
        run: echo "image_name=${IMAGE_NAME,,}" >> $GITHUB_OUTPUT

      - name: Get latest qdrant-loader version from PyPI
        id: pypi
        run: |
          VERSION=$(curl -sf https://pypi.org/pypi/qdrant-loader/json | jq -r '.info.version')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Latest qdrant-loader version on PyPI: ${VERSION}"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image tag already exists
        id: check
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_name }}:${{ steps.pypi.outputs.version }}
        run: |
          if docker manifest inspect "${IMAGE}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Image ${IMAGE} already exists — skipping build."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Image ${IMAGE} not found — proceeding with build."
          fi

      - name: Build and push
        if: steps.check.outputs.exists == 'false' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            QDRANT_LOADER_VERSION=${{ steps.pypi.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_name }}:${{ steps.pypi.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_name }}:latest
