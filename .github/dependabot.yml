version: 2

updates:
  # Keep GitHub Actions up to date
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: UTC
    labels:
      - dependencies
      - github-actions

  # qdrant-loader image
  - package-ecosystem: docker
    directory: /qdrant-loader
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: UTC
    labels:
      - dependencies
      - docker

  # qdrant-mcp image
  - package-ecosystem: docker
    directory: /qdrant-mcp
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: UTC
    labels:
      - dependencies
      - docker
